<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ForFabio [MODO TESTE]</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #34495e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
        }

        .logo-gif {
            width: 100%;
            max-width: 250px;
            height: auto;
            margin-bottom: 10px;
        }

        /* BANNER DE MODO TESTE */
        .banner-teste {
            background: #fff3cd;
            border: 2px dashed #f1c40f;
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #856404;
            font-weight: 600;
        }

        h2 { color: #2c3e50; margin-bottom: 20px; font-weight: 600; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        input:focus {
            border-color: #27ae60;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover { background: #219150; transform: translateY(-2px); }

        /* BOTÃO DE ACESSO RÁPIDO */
        .btn-teste {
            background: #e67e22 !important;
            margin-top: 10px;
        }
        .btn-teste:hover { background: #d35400 !important; }

        .link-troca {
            color: #3498db;
            font-size: 14px;
            margin-top: 20px;
            cursor: pointer;
            display: inline-block;
            text-decoration: underline;
        }

        .mensagem {
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
            font-weight: 500;
        }

        #formCadastro { display: none; }

        .divider {
            display: flex;
            align-items: center;
            margin: 15px 0 5px;
            color: #95a5a6;
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eee;
            margin: 0 10px;
        }

        @media (max-width: 400px) { .login-card { padding: 25px; } }
    </style>
</head>

<body>

<div class="login-card">
    <img src="logo_forfabio.gif" class="logo-gif" alt="Logo ForFabio">

    <div class="banner-teste">
        ⚙️ <strong>MODO DESENVOLVIMENTO</strong><br>
        Use o botão laranja para acesso instantâneo
    </div>

    <div id="formLogin">
        <h2>Acesso ao Sistema</h2>

        <!-- BOTÃO DE ACESSO RÁPIDO PARA TESTES -->
        <button class="btn-teste" onclick="loginRapido()">⚡ Entrar como TESTER (Dev)</button>

        <div class="divider">ou login manual</div>

        <input type="text" id="raLogin" placeholder="Digite seu RA">
        <input type="password" id="senhaLogin" placeholder="Sua Senha">
        <button onclick="tentarLogin()">Entrar</button>
        <div id="msgLogin" class="mensagem"></div>
        <span class="link-troca" onclick="alternarTela('cadastro')">Criar conta</span>
    </div>

    <div id="formCadastro">
        <h2>Novo Operador</h2>
        <input type="text" id="cadNome" placeholder="Nome Completo">
        <input type="text" id="cadRA" placeholder="RA">
        <input type="text" id="cadTurma" placeholder="Turma">
        <input type="password" id="cadSenha" placeholder="Senha">
        <button onclick="registrarUsuario()" style="background:#2980b9;">Cadastrar</button>
        <div id="msgCadastro" class="mensagem"></div>
        <span class="link-troca" onclick="alternarTela('login')">Voltar</span>
    </div>
</div>

<script>
let bancoDeDados = JSON.parse(localStorage.getItem('dbForFabio')) || {};

function salvarDB() {
    localStorage.setItem('dbForFabio', JSON.stringify(bancoDeDados));
}

/* =========================
   ⚡ LOGIN RÁPIDO PARA TESTES
   Substitua o nome/RA conforme necessário
========================= */
function loginRapido() {
    const RA_TESTE = "dev01";
    const NOME_TESTE = "Tester Dev";

    // Cria o usuário de teste no banco se ainda não existir
    if (!bancoDeDados[RA_TESTE]) {
        bancoDeDados[RA_TESTE] = { nome: NOME_TESTE, turma: "DEV", senha: "bypass-dev" };
        salvarDB();
    }

    localStorage.setItem('usuarioLogado', RA_TESTE);
    localStorage.setItem('nomeUsuarioLogado', NOME_TESTE);

    const msg = document.getElementById('msgLogin');
    msg.style.color = "#27ae60";
    msg.innerText = "✅ Acesso Dev concedido! Entrando...";

    setTimeout(() => { window.location.href = "home.html"; }, 600);
}

/* ========================= */

async function hashSenha(senha) {
    const encoder = new TextEncoder();
    const data = encoder.encode(senha);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function alternarTela(tela) {
    document.getElementById('msgLogin').innerText = "";
    document.getElementById('msgCadastro').innerText = "";
    if (tela === 'cadastro') {
        document.getElementById('formLogin').style.display = 'none';
        document.getElementById('formCadastro').style.display = 'block';
    } else {
        document.getElementById('formCadastro').style.display = 'none';
        document.getElementById('formLogin').style.display = 'block';
    }
}

async function registrarUsuario() {
    const nome = document.getElementById('cadNome').value.trim();
    const ra = document.getElementById('cadRA').value.trim();
    const turma = document.getElementById('cadTurma').value.trim();
    const senha = document.getElementById('cadSenha').value;
    const msg = document.getElementById('msgCadastro');

    if (!nome || !ra || !turma || !senha) {
        msg.style.color = "#e74c3c"; msg.innerText = "⚠️ Preencha todos os campos!"; return;
    }
    if (bancoDeDados[ra]) {
        msg.style.color = "#e74c3c"; msg.innerText = "❌ RA já cadastrado!"; return;
    }

    msg.style.color = "#2c3e50"; msg.innerText = "⏳ Cadastrando...";
    const senhaHash = await hashSenha(senha);
    bancoDeDados[ra] = { nome, turma, senha: senhaHash };
    salvarDB();

    msg.style.color = "#27ae60"; msg.innerText = "✅ Cadastro realizado com sucesso!";
    ["cadNome","cadRA","cadTurma","cadSenha"].forEach(id => document.getElementById(id).value = "");
    setTimeout(() => alternarTela('login'), 1500);
}

async function tentarLogin() {
    const ra = document.getElementById('raLogin').value.trim();
    const senha = document.getElementById('senhaLogin').value;
    const msg = document.getElementById('msgLogin');

    if (!ra || !senha) {
        msg.style.color = "#e74c3c"; msg.innerText = "⚠️ Preencha todos os campos!"; return;
    }

    msg.style.color = "#2c3e50"; msg.innerText = "⏳ Verificando credenciais...";
    const senhaHash = await hashSenha(senha);

    if (!bancoDeDados[ra] || bancoDeDados[ra].senha !== senhaHash) {
        msg.style.color = "#e74c3c"; msg.innerText = "❌ Usuário ou senha incorretos!"; return;
    }

    localStorage.setItem('usuarioLogado', ra);
    localStorage.setItem('nomeUsuarioLogado', bancoDeDados[ra].nome);
    msg.style.color = "#27ae60"; msg.innerText = "✅ Acesso concedido! Entrando...";
    setTimeout(() => { window.location.href = "home.html"; }, 800);
}

document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        if (document.getElementById('formLogin').style.display !== "none") tentarLogin();
        else registrarUsuario();
    }
});
</script>

</body>
</html>
